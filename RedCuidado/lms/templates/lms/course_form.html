{% extends 'lms/base_dashboard.html' %}

{% block dashboard_content %}
<main class="flex-1 p-6 w-full max-w-4xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">{{ title }}</h1>
        <p class="text-gray-500">Complete los detalles del curso a continuación.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Título del Curso</label>
                    {{ form.title }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Código (ej. ELD 101)</label>
                    {{ form.code }}
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                {{ form.description }}
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-gray-100 pt-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Imagen de Portada (Archivo)</label>
                    {{ form.image }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">URL de Imagen (Opcional)</label>
                    {{ form.image_url }}
                </div>
            </div>

            <div class="border-t border-gray-100 pt-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Áreas de Trabajo Asignadas</label>
                <div class="bg-gray-50 p-4 rounded-lg border max-h-48 overflow-y-auto">
                    {{ form.assigned_work_areas }}
                </div>
            </div>

            <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-100">
                <a href="{% url 'home' %}" class="px-6 py-2 border rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                    Guardar Curso
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
