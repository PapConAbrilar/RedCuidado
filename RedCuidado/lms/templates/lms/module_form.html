{% extends 'lms/base_dashboard.html' %}

{% block dashboard_content %}
<main class="flex-1 p-6 w-full max-w-2xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Añadir Módulo a {{ course.title }}</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Título del Módulo</label>
                {{ form.title }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Orden</label>
                {{ form.order }}
            </div>

            <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-100">
                <a href="{% url 'course_manage' course.id %}" class="px-6 py-2 border rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                    Añadir Módulo
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
